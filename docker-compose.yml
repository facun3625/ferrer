version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: estudio_ferrer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: estudio_ferrer
    ports:
      - "5435:5432"
    volumes:
      - pgdata_estudio_ferrer:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata_estudio_ferrer:
